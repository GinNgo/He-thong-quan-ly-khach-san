spring:
  application:
    name: backend

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  datasource:
    # SQL Server Configuration
    url: jdbc:sqlserver://127.0.0.1:1433;databaseName=HotelDB;encrypt=true;trustServerCertificate=true
    username: sa
    password: HotelAdmin@2026!
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "http://localhost:8080" # Placeholder

# Payment Gateway Configurations
payment:
  vnpay:
    tmn-code: Q2ZKXLEV
    hash-secret: FD29IIR417EN8UBMQWQZR52M6DTN8HKW
    url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    return-url: http://localhost:4200/payment-result
    version: 2.1.0
    command: pay

server:
  port: 8080

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000 # 24 hours
