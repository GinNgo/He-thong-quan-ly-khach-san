app:
  location-import:
    enabled: true
    file-path: ../docs/34_tinh_huyen_xa.json
    cleanup-obsolete: false
  demo-data:
    enabled: false
    legacy-seed: false
    nationwide-property-seed: false
    coverage-mode: STANDARD
    properties-per-province: 5
    properties-per-ward: 1
    max-total-properties: 5000
