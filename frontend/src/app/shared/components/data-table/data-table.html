<div class="card bg-white rounded-3 shadow-sm border-0">
  <p-table 
    #dt 
    [value]="data" 
    [columns]="columns"
    [lazy]="true" 
    (onLazyLoad)="onLazyLoad($event)" 
    [loading]="loading"
    [paginator]="true" 
    [rows]="pageSize" 
    [totalRecords]="totalRecords"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Hiển thị {first} đến {last} trong tổng số {totalRecords} mục"
    [rowsPerPageOptions]="[10, 20, 50]"
    styleClass="p-datatable-sm p-datatable-striped"
    [tableStyle]="{'min-width': '50rem'}">
    
    <!-- Toolbar (Search & Export) -->
    <ng-template pTemplate="caption">
      <div class="d-flex justify-content-between align-items-center">
        <p-iconField iconPosition="left">
          <p-inputIcon>
            <i class="pi pi-search"></i>
          </p-inputIcon>
          <input 
            pInputText 
            type="text" 
            (input)="onGlobalSearch($event)" 
            placeholder="Tìm kiếm nhanh..." 
            class="form-control" />
        </p-iconField>
        
        <div class="d-flex gap-2">
          <p-button icon="pi pi-file-excel" (onClick)="exportExcel()" severity="success" pTooltip="Xuất Excel" tooltipPosition="bottom"></p-button>
          <p-button icon="pi pi-file-pdf" (onClick)="exportPdf()" severity="danger" pTooltip="Xuất PDF" tooltipPosition="bottom"></p-button>
        </div>
      </div>
    </ng-template>

    <!-- Header -->
    <ng-template pTemplate="header" let-columns>
      <tr>
        <th *ngFor="let col of columns" [pSortableColumn]="col.sortable ? col.field : null" [style.width]="col.width">
          {{ col.header }}
          <p-sortIcon *ngIf="col.sortable" [field]="col.field"></p-sortIcon>
        </th>
        <th style="width: 120px;" class="text-center">Thao tác</th>
      </tr>
      <tr>
        <th *ngFor="let col of columns">
          <p-columnFilter *ngIf="col.filterable" type="text" [field]="col.field"></p-columnFilter>
        </th>
        <th></th>
      </tr>
    </ng-template>

    <!-- Body -->
    <ng-template pTemplate="body" let-rowData let-columns="columns">
      <tr (click)="rowClick.emit(rowData)" style="cursor: pointer;">
        <td *ngFor="let col of columns" [ngClass]="'text-' + (col.align || 'left')">
          <ng-container *ngIf="!col.type || col.type === 'text'">
            {{ rowData[col.field] }}
          </ng-container>
          <ng-container *ngIf="col.type === 'currency'">
            {{ rowData[col.field] | currency:'VND' }}
          </ng-container>
          <ng-container *ngIf="col.type === 'date'">
            {{ rowData[col.field] | date:(col.format || 'dd/MM/yyyy HH:mm') }}
          </ng-container>
          <ng-container *ngIf="col.type === 'boolean'">
            <i class="pi" [ngClass]="{'pi-check text-success': rowData[col.field], 'pi-times text-danger': !rowData[col.field]}"></i>
          </ng-container>
          <ng-container *ngIf="col.type === 'badge'">
            <span class="badge" [ngClass]="rowData[col.field + 'Class'] || 'bg-secondary'">
              {{ rowData[col.field] }}
            </span>
          </ng-container>
        </td>
        
        <!-- Actions -->
        <td class="text-center" (click)="$event.stopPropagation()">
          <div class="d-flex justify-content-center gap-2">
            <button *ngIf="permissions.view" [hasPermission]="permissions.view" class="btn btn-sm btn-outline-info" (click)="view.emit(rowData)" pTooltip="Chi tiết" tooltipPosition="top">
              <i class="pi pi-eye"></i>
            </button>
            <button *ngIf="permissions.edit" [hasPermission]="permissions.edit" class="btn btn-sm btn-outline-primary" (click)="edit.emit(rowData)" pTooltip="Chỉnh sửa" tooltipPosition="top">
              <i class="pi pi-pencil"></i>
            </button>
            <button *ngIf="permissions.delete" [hasPermission]="permissions.delete" class="btn btn-sm btn-outline-danger" (click)="delete.emit(rowData)" pTooltip="Xóa" tooltipPosition="top">
              <i class="pi pi-trash"></i>
            </button>
          </div>
        </td>
      </tr>
    </ng-template>

    <!-- Empty Message -->
    <ng-template pTemplate="emptymessage">
      <tr>
        <td [attr.colspan]="(columns.length || 0) + 1" class="text-center py-5">
          <div class="d-flex flex-column align-items-center justify-content-center" style="min-height: 200px;">
            <div class="rounded-circle d-flex align-items-center justify-content-center mb-3" style="width: 64px; height: 64px; background-color: #f8fafc;">
              <i class="pi pi-folder-open text-muted" style="font-size: 1.75rem;"></i>
            </div>
            <h6 class="fw-bold text-dark mb-1">Chưa có dữ liệu</h6>
            <p class="text-muted small mb-0">Hiện tại không có bản ghi nào để hiển thị.</p>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
