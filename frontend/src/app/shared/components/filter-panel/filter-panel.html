<div class="card mb-4 border-0 shadow-sm rounded-4 bg-white">
  <div class="card-header bg-white border-bottom-0 pt-3 pb-0 d-flex justify-content-between align-items-center">
    <h5 class="mb-0 fw-bold d-flex align-items-center text-dark" style="font-size: 1.1rem;">
      <i class="pi pi-filter me-2" style="color: var(--hotel-gold);"></i> Bộ lọc Tìm kiếm
    </h5>
    <button class="btn btn-link text-muted p-0 text-decoration-none" (click)="toggleExpand()">
      <i class="pi" [ngClass]="isExpanded() ? 'pi-chevron-up' : 'pi-chevron-down'"></i>
      <span class="ms-1" style="font-size: 0.85rem;">{{ isExpanded() ? 'Thu gọn' : 'Mở rộng' }}</span>
    </button>
  </div>
  
  <div class="card-body" *ngIf="isExpanded()">
    <div class="row g-3">
      <ng-container *ngFor="let config of filters">
        <div class="col-12 col-md-6 col-lg-4 col-xl-3">
          <label class="form-label text-muted fw-medium mb-1" style="font-size: 0.85rem;">{{ config.label }}</label>
          
          <ng-container *ngIf="config.type === 'text'">
            <input pInputText type="text" class="form-control" [(ngModel)]="filterValues[config.field]" [placeholder]="config.placeholder || ''">
          </ng-container>

          <ng-container *ngIf="config.type === 'select'">
            <!-- <app-select></app-select> will be used when it's fully implemented -->
            <app-select 
              [(ngModel)]="filterValues[config.field]" 
              [options]="config.options || []"
              [placeholder]="config.placeholder || 'Chọn...'">
            </app-select>
          </ng-container>
          
          <ng-container *ngIf="config.type === 'date'">
            <!-- <app-date-picker></app-date-picker> will be used when it's fully implemented -->
            <app-date-picker 
              [(ngModel)]="filterValues[config.field]" 
              [placeholder]="config.placeholder || 'Chọn ngày'">
            </app-date-picker>
          </ng-container>

        </div>
      </ng-container>
    </div>

    <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
      <p-button label="Làm mới" icon="pi pi-refresh" severity="secondary" [outlined]="true" (onClick)="onReset()"></p-button>
      <p-button label="Tìm kiếm" icon="pi pi-search" styleClass="p-button-primary" (onClick)="onSearch()"></p-button>
    </div>
  </div>
</div>
