<div class="px-4 py-4 space-y-4">
  <!-- BEGIN: Statistics Cards -->
  <section class="row g-4 mb-4">
    <!-- Active Issues Card -->
    <div class="col-12 col-md-6 col-lg-3">
      <app-stat-card 
        title="Sự cố đang hoạt động" 
        value="14" 
        icon="pi pi-exclamation-triangle"
        iconColor="#1978e5"
        iconBgColor="#eff6ff"
        borderColor="#dc3545">
      </app-stat-card>
    </div>
    
    <!-- Pending Repairs Card -->
    <div class="col-12 col-md-6 col-lg-3">
      <app-stat-card 
        title="Sửa chữa đang chờ" 
        value="8" 
        icon="pi pi-clock"
        iconColor="#fb923c"
        iconBgColor="#fff7ed"
        borderColor="#ffc107">
      </app-stat-card>
    </div>
    
    <!-- Emergency Requests Card -->
    <div class="col-12 col-md-6 col-lg-3">
      <app-stat-card 
        title="Yêu cầu khẩn cấp" 
        value="3" 
        icon="pi pi-bell"
        iconColor="#dc3545"
        iconBgColor="#f8d7da"
        borderColor="#dc3545">
      </app-stat-card>
    </div>
    
    <!-- Completed Today Card -->
    <div class="col-12 col-md-6 col-lg-3">
      <app-stat-card 
        title="Hoàn thành hôm nay" 
        value="22" 
        icon="pi pi-check-circle"
        iconColor="#198754"
        iconBgColor="#d1e7dd"
        borderColor="#198754">
      </app-stat-card>
    </div>
  </section>

  <!-- BEGIN: Analytics Row -->
  <section class="row g-4 mb-4" *ngIf="data">
    <div class="col-12 col-lg-6">
      <app-revenue-chart [labels]="data.labels" [datasets]="revenueChartData.datasets"></app-revenue-chart>
    </div>
    <div class="col-12 col-lg-6">
      <app-occupancy-chart [labels]="data.labels" [datasets]="occupancyChartData.datasets"></app-occupancy-chart>
    </div>
  </section>

  <!-- BEGIN: Work Order Table -->
  <section class="bg-white rounded-3 shadow-sm border overflow-hidden mb-4">
    <div class="p-4 border-bottom d-flex align-items-center justify-content-between">
      <h2 class="h5 mb-0 fw-bold text-dark">Yêu cầu bảo trì</h2>
    </div>
    <app-data-table
      [columns]="workOrderColumns"
      [data]="workOrders"
      [totalRecords]="totalWorkOrders"
      [loading]="loadingWorkOrders"
      [pageSize]="10"
      (pageChange)="onPageChange($event)"
      (sortChange)="onSortChange($event)"
      (filterChange)="onFilterChange($event)">
    </app-data-table>
  </section>
</div>
