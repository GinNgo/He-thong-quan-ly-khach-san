<p-card header="Quản lý Người dùng" styleClass="shadow-sm mt-3">
  <p-table 
    [value]="users" 
    [paginator]="true" 
    [rows]="10" 
    [loading]="loading"
    [rowHover]="true" 
    responsiveLayout="scroll"
    styleClass="p-datatable-striped"
  >
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="id">ID <p-sortIcon field="id"></p-sortIcon></th>
        <th pSortableColumn="username">Tài khoản <p-sortIcon field="username"></p-sortIcon></th>
        <th pSortableColumn="email">Email <p-sortIcon field="email"></p-sortIcon></th>
        <th>Vai trò</th>
        <th pSortableColumn="status">Trạng thái <p-sortIcon field="status"></p-sortIcon></th>
        <th>Thao tác</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.email }}</td>
        <td>
          <span class="badge bg-primary me-1" *ngFor="let role of user.roles">
            {{ role.name }}
          </span>
        </td>
        <td>
          <span class="badge" [ngClass]="{'bg-success': user.status === 'ACTIVE', 'bg-danger': user.status === 'INACTIVE'}">
            {{ user.status }}
          </span>
        </td>
        <td>
          <p-button icon="pi pi-pencil" styleClass="p-button-rounded p-button-text p-button-info mr-2"></p-button>
          <p-button icon="pi pi-trash" styleClass="p-button-rounded p-button-text p-button-danger"></p-button>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center p-4">Không tìm thấy dữ liệu người dùng.</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
