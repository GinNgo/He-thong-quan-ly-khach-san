<div class="m-3">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="mb-1 text-dark fw-bold">
        <i class="pi {{ userType === 'CUSTOMER' ? 'pi-id-card' : 'pi-users' }} me-2" style="color: var(--hotel-gold);"></i>
        {{ userType === 'CUSTOMER' ? 'Quản lý Khách hàng' : 'Quản lý Nhân sự' }}
      </h2>
      <p class="text-muted mb-0">Quản lý tài khoản, phân quyền và trạng thái</p>
    </div>
    <button pButton [label]="userType === 'CUSTOMER' ? 'Thêm khách hàng' : 'Thêm nhân sự'" [icon]="userType === 'CUSTOMER' ? 'pi pi-user-plus' : 'pi pi-user-plus'" class="btn btn-primary-hotel" (click)="openNew()"></button>
  </div>

  <p-card styleClass="shadow-sm border-0 rounded-4" [style]="{'border-radius': '12px'}">
    <p-table 
      [value]="users" 
      [paginator]="true" 
      [rows]="10" 
      [loading]="loading"
      [rowHover]="true" 
      responsiveLayout="scroll"
      styleClass="p-datatable-striped p-datatable-sm border-top"
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="id" class="text-muted fw-bold border-bottom" style="font-size: 0.85rem; text-transform: uppercase;">ID <p-sortIcon field="id"></p-sortIcon></th>
          <th pSortableColumn="username" class="text-muted fw-bold border-bottom" style="font-size: 0.85rem; text-transform: uppercase;">Tài khoản <p-sortIcon field="username"></p-sortIcon></th>
          <th pSortableColumn="email" class="text-muted fw-bold border-bottom" style="font-size: 0.85rem; text-transform: uppercase;">Email <p-sortIcon field="email"></p-sortIcon></th>
          <th *ngIf="userType === 'STAFF'" class="text-muted fw-bold border-bottom" style="font-size: 0.85rem; text-transform: uppercase;">Vai trò</th>
          <th pSortableColumn="status" class="text-muted fw-bold border-bottom" style="font-size: 0.85rem; text-transform: uppercase;">Trạng thái <p-sortIcon field="status"></p-sortIcon></th>
          <th class="text-muted fw-bold border-bottom text-center" style="font-size: 0.85rem; text-transform: uppercase;">Thao tác</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-user>
        <tr>
          <td class="text-muted fw-bold">#{{ user.id }}</td>
          <td class="text-dark fw-bold">{{ user.username }}</td>
          <td class="text-muted">{{ user.email }}</td>
          <td *ngIf="userType === 'STAFF'">
            <span class="badge rounded-pill bg-light text-dark border me-1" *ngFor="let role of user.roles" style="font-size: 0.8rem;">
              {{ role.name }}
            </span>
          </td>
          <td>
            <span class="badge rounded-pill badge-status" 
                  [ngClass]="{
                    'status-available': user.status === 'ACTIVE', 
                    'status-maintenance': user.status === 'INACTIVE'
                  }">
              {{ user.status }}
            </span>
          </td>
          <td class="text-center">
            <div class="d-flex gap-2 justify-content-center">
              <button pButton icon="pi pi-pencil" class="p-button-text p-button-secondary p-button-sm" (click)="editUser(user)"></button>
              <button pButton icon="pi pi-trash" class="p-button-text p-button-danger p-button-sm" (click)="deleteUser(user)"></button>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td [attr.colspan]="userType === 'STAFF' ? 6 : 5" class="text-center p-4 text-muted">Không tìm thấy dữ liệu người dùng.</td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>

  <p-dialog [(visible)]="displayDialog" [style]="{width: '750px'}" [header]="(userDialogMode === 'create' ? 'Thêm ' : 'Cập nhật ') + (userType === 'CUSTOMER' ? 'Khách hàng' : 'Nhân sự')" [modal]="true" styleClass="p-fluid">
    <ng-template pTemplate="content">
      <div class="row pt-2">
        <div class="col-12 col-md-6 mb-4 d-flex flex-column gap-2">
          <label for="username" class="fw-bold mb-0">Tên tài khoản (Username) <span class="text-danger">*</span></label>
          <input type="text" pInputText id="username" [(ngModel)]="userForm.username" [disabled]="userDialogMode === 'edit'" required autofocus />
        </div>
        <div class="col-12 col-md-6 mb-4 d-flex flex-column gap-2">
          <label for="email" class="fw-bold mb-0">Email <span class="text-danger">*</span></label>
          <input type="email" pInputText id="email" [(ngModel)]="userForm.email" [disabled]="userDialogMode === 'edit'" required />
        </div>
        <div class="col-12 col-md-6 mb-4 d-flex flex-column gap-2">
          <label for="password" class="fw-bold mb-0">Mật khẩu <span *ngIf="userDialogMode === 'create'" class="text-danger">*</span></label>
          <input type="password" pInputText id="password" [(ngModel)]="userForm.password" [placeholder]="userDialogMode === 'edit' ? 'Để trống nếu không đổi' : ''" />
        </div>
        <div class="col-12 col-md-6 mb-4 d-flex flex-column gap-2">
          <label for="fullName" class="fw-bold mb-0">Họ và Tên</label>
          <input type="text" pInputText id="fullName" [(ngModel)]="userForm.fullName" />
        </div>
        <div class="col-12 col-md-6 mb-4 d-flex flex-column gap-2">
          <label for="phone" class="fw-bold mb-0">Số điện thoại</label>
          <input type="text" pInputText id="phone" [(ngModel)]="userForm.phone" />
        </div>
        <div class="col-12 col-md-6 mb-4 d-flex flex-column gap-2">
          <label for="status" class="fw-bold mb-0">Trạng thái</label>
          <p-select [options]="[{label: 'Hoạt động (ACTIVE)', value: 'ACTIVE'}, {label: 'Khóa (INACTIVE)', value: 'INACTIVE'}]" [(ngModel)]="userForm.status" appendTo="body" styleClass="w-100"></p-select>
        </div>
        <ng-container *ngIf="userType === 'STAFF'">
          <div class="col-12 col-md-6 mb-4 d-flex flex-column gap-2">
            <label for="roles" class="fw-bold mb-0">Vai trò (Roles)</label>
            <p-multiSelect [options]="roles" [(ngModel)]="userForm.roleIds" optionLabel="name" optionValue="id" defaultLabel="Chọn vai trò" display="chip" appendTo="body" styleClass="w-100"></p-multiSelect>
          </div>
          <div class="col-12 col-md-6 mb-4 d-flex flex-column gap-2">
            <label for="hotel" class="fw-bold mb-0">Cơ sở (Khách sạn quản lý)</label>
            <p-select [options]="hotels" [(ngModel)]="userForm.hotelId" optionLabel="name" optionValue="id" [showClear]="true" placeholder="Chọn cơ sở" appendTo="body" styleClass="w-100"></p-select>
          </div>
        </ng-container>
      </div>
    </ng-template>

    <ng-template pTemplate="footer">
      <button pButton label="Hủy" icon="pi pi-times" class="p-button-text" (click)="displayDialog = false"></button>
      <button pButton label="Lưu" icon="pi pi-check" class="p-button-primary" (click)="saveUser()"></button>
    </ng-template>
  </p-dialog>
</div>
