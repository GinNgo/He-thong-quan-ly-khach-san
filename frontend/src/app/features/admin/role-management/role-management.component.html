<div class="m-3">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="mb-1 text-dark fw-bold"><i class="pi pi-id-card me-2" style="color: var(--hotel-gold);"></i>Quản lý Vai trò</h2>
      <p class="text-muted mb-0">Quản lý danh sách vai trò hệ thống</p>
    </div>
    <button pButton label="Thêm vai trò" icon="pi pi-plus" class="btn btn-primary-hotel" (click)="openNew()"></button>
  </div>

  <p-card styleClass="shadow-sm border-0 rounded-4" [style]="{'border-radius': '12px'}">
    <p-table 
      [value]="roles" 
      [paginator]="true" 
      [rows]="10" 
      [loading]="loading"
      [rowHover]="true" 
      responsiveLayout="scroll"
      styleClass="p-datatable-striped p-datatable-sm border-top"
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="id" class="text-muted fw-bold border-bottom" style="font-size: 0.85rem; text-transform: uppercase;">ID <p-sortIcon field="id"></p-sortIcon></th>
          <th pSortableColumn="code" class="text-muted fw-bold border-bottom" style="font-size: 0.85rem; text-transform: uppercase;">Mã vai trò <p-sortIcon field="code"></p-sortIcon></th>
          <th pSortableColumn="name" class="text-muted fw-bold border-bottom" style="font-size: 0.85rem; text-transform: uppercase;">Tên vai trò <p-sortIcon field="name"></p-sortIcon></th>
          <th class="text-muted fw-bold border-bottom" style="font-size: 0.85rem; text-transform: uppercase;">Mô tả</th>
          <th class="text-muted fw-bold border-bottom text-center" style="font-size: 0.85rem; text-transform: uppercase;">Thao tác</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-role>
        <tr>
          <td class="text-muted fw-bold">#{{ role.id }}</td>
          <td class="text-dark fw-bold"><span class="badge bg-secondary">{{ role.code }}</span></td>
          <td class="text-dark fw-bold">{{ role.name }}</td>
          <td class="text-muted">{{ role.description }}</td>
          <td class="text-center">
            <div class="d-flex gap-2 justify-content-center">
              <button pButton icon="pi pi-pencil" class="p-button-text p-button-secondary p-button-sm" (click)="editRole(role)"></button>
              <button pButton icon="pi pi-trash" class="p-button-text p-button-danger p-button-sm" (click)="deleteRole(role)"></button>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center p-4 text-muted">Không tìm thấy dữ liệu vai trò.</td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>

  <p-dialog [(visible)]="displayDialog" [style]="{width: '650px'}" header="{{ roleDialogMode === 'create' ? 'Thêm Vai trò mới' : 'Cập nhật Vai trò' }}" [modal]="true" styleClass="p-fluid">
    <ng-template pTemplate="content">
      <div class="p-3">
        <div class="field mb-4">
          <label for="code" class="fw-bold mb-2">Mã vai trò (Code) <span class="text-danger">*</span></label>
          <input type="text" pInputText id="code" [(ngModel)]="roleForm.code" required autofocus placeholder="VD: ACCOUNTANT" style="text-transform: uppercase;" />
        </div>
        <div class="field mb-4">
          <label for="name" class="fw-bold mb-2">Tên vai trò <span class="text-danger">*</span></label>
          <input type="text" pInputText id="name" [(ngModel)]="roleForm.name" required placeholder="VD: Kế toán" />
        </div>
        <div class="field mb-4">
          <label for="description" class="fw-bold mb-2">Mô tả</label>
          <textarea pInputTextarea id="description" [(ngModel)]="roleForm.description" rows="3"></textarea>
        </div>
      </div>
    </ng-template>

    <ng-template pTemplate="footer">
      <button pButton label="Hủy" icon="pi pi-times" class="p-button-text" (click)="displayDialog = false"></button>
      <button pButton label="Lưu" icon="pi pi-check" class="p-button-primary" (click)="saveRole()"></button>
    </ng-template>
  </p-dialog>
</div>
