<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="card border-0 shadow-sm m-3">
  <div class="card-header bg-white border-0 py-3 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
    <div>
      <h5 class="mb-1 fw-bold text-primary"><i class="pi pi-id-card me-2"></i>Quản lý vai trò</h5>
      <div class="text-muted small">Tạo vai trò và gán quyền truy cập theo trang.</div>
    </div>
    <div class="d-flex flex-wrap gap-2">
      <button pButton label="Tải lại" icon="pi pi-refresh" class="p-button-sm p-button-outlined p-button-secondary" (click)="loadRoles()" [disabled]="loading || saving"></button>
      <button *ngIf="canCreate" pButton label="Thêm vai trò" icon="pi pi-plus" class="p-button-sm p-button-primary" (click)="openNew()" [disabled]="loading || saving"></button>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger m-3 d-flex align-items-center justify-content-between gap-3">
    <span><i class="pi pi-exclamation-circle me-2"></i>{{ errorMessage }}</span>
    <button pButton label="Thử lại" icon="pi pi-refresh" class="p-button-sm p-button-danger p-button-outlined" (click)="loadRoles()" [disabled]="loading"></button>
  </div>

  <div class="card-body p-0">
    <p-table
      [value]="roles"
      [paginator]="true"
      [rows]="10"
      [loading]="loading"
      [rowHover]="true"
      responsiveLayout="scroll"
      styleClass="p-datatable-sm">
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="id" style="width: 10%">ID <p-sortIcon field="id"></p-sortIcon></th>
          <th pSortableColumn="code" style="width: 20%">Mã <p-sortIcon field="code"></p-sortIcon></th>
          <th pSortableColumn="name" style="width: 25%">Tên vai trò <p-sortIcon field="name"></p-sortIcon></th>
          <th style="width: 30%">Mô tả</th>
          <th style="width: 15%" class="text-center">Thao tác</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-role>
        <tr class="tree-table-row">
          <td class="text-muted fw-bold">#{{ role.id }}</td>
          <td class="text-dark fw-bold"><span class="badge bg-secondary">{{ role.code }}</span></td>
          <td class="text-dark fw-bold">{{ role.name }}</td>
          <td class="text-muted">{{ role.description || '-' }}</td>
          <td class="text-center">
            <div class="d-flex flex-wrap gap-1 justify-content-center">
              <button pButton icon="pi pi-shield" class="p-button-text p-button-info p-button-sm" title="Phân quyền" (click)="openPermissions(role)"></button>
              <button *ngIf="canUpdate" pButton icon="pi pi-pencil" class="p-button-text p-button-secondary p-button-sm" title="Sửa" (click)="editRole(role)" [disabled]="saving"></button>
              <button *ngIf="canDelete" pButton icon="pi pi-trash" class="p-button-text p-button-danger p-button-sm" title="Xóa" (click)="deleteRole(role)" [disabled]="saving"></button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center p-4 text-muted">Chưa có vai trò.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-dialog
  [(visible)]="displayDialog"
  [style]="{width: '560px'}"
  [header]="roleDialogMode === 'create' ? 'Thêm vai trò' : 'Cập nhật vai trò'"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="!saving"
  appendTo="body"
  styleClass="p-fluid">
  <div class="d-flex flex-column gap-3 p-2">
    <div class="field">
      <label for="code" class="fw-bold mb-1">Mã vai trò <span class="text-danger">*</span></label>
      <input type="text" pInputText id="code" [(ngModel)]="roleForm.code" required autofocus placeholder="VD: ACCOUNTANT" class="w-100 text-uppercase" [disabled]="saving" />
    </div>
    <div class="field">
      <label for="name" class="fw-bold mb-1">Tên vai trò <span class="text-danger">*</span></label>
      <input type="text" pInputText id="name" [(ngModel)]="roleForm.name" required placeholder="VD: Kế toán" class="w-100" [disabled]="saving" />
    </div>
    <div class="field">
      <label for="description" class="fw-bold mb-1">Mô tả</label>
      <textarea pInputTextarea id="description" [(ngModel)]="roleForm.description" rows="3" class="w-100" [disabled]="saving"></textarea>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <button pButton label="Hủy" icon="pi pi-times" class="p-button-text" (click)="displayDialog = false" [disabled]="saving"></button>
    <button pButton [label]="saving ? 'Đang lưu...' : 'Lưu'" [icon]="saving ? 'pi pi-spin pi-spinner' : 'pi pi-check'" class="p-button-primary" (click)="saveRole()" [disabled]="saving"></button>
  </ng-template>
</p-dialog>
