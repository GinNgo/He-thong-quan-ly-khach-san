<p-card header="Quản lý Dịch vụ" styleClass="shadow-sm mt-3">
  <div class="mb-3">
    <p-button label="Thêm Dịch vụ mới" icon="pi pi-plus" styleClass="p-button-success"></p-button>
  </div>
  
  <p-table 
    [value]="services" 
    [paginator]="true" 
    [rows]="10" 
    [loading]="loading"
    [rowHover]="true" 
    responsiveLayout="scroll"
    styleClass="p-datatable-striped"
  >
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="code">Mã Dịch vụ <p-sortIcon field="code"></p-sortIcon></th>
        <th pSortableColumn="nameVi">Tên Dịch vụ <p-sortIcon field="nameVi"></p-sortIcon></th>
        <th pSortableColumn="price">Giá <p-sortIcon field="price"></p-sortIcon></th>
        <th pSortableColumn="status">Trạng thái <p-sortIcon field="status"></p-sortIcon></th>
        <th>Mô tả</th>
        <th>Thao tác</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-service>
      <tr>
        <td><strong>{{ service.code }}</strong></td>
        <td>{{ service.nameVi }}</td>
        <td>{{ service.price | currency:'VND' }}</td>
        <td>
          <span class="badge" [ngClass]="{'bg-success': service.status === 'ACTIVE', 'bg-danger': service.status === 'INACTIVE'}">
            {{ service.status }}
          </span>
        </td>
        <td>{{ service.descriptionVi }}</td>
        <td>
          <p-button icon="pi pi-pencil" styleClass="p-button-rounded p-button-text p-button-info mr-2"></p-button>
          <p-button icon="pi pi-trash" styleClass="p-button-rounded p-button-text p-button-danger"></p-button>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center p-4">Không có dịch vụ nào trong hệ thống.</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
