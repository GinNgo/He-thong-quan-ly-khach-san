<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="card">
    <div class="flex justify-content-between align-items-center mb-4">
        <h2>Quản lý cơ sở lưu trú</h2>
        <button pButton pRipple label="Thêm mới" icon="pi pi-plus" class="p-button-success mr-2"></button>
    </div>

    <p-table [value]="properties" [loading]="loading" [rowHover]="true" styleClass="p-datatable-gridlines" [paginator]="true" [rows]="10">
        <ng-template pTemplate="header">
            <tr>
                <th>Tên cơ sở</th>
                <th>Thành phố</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-property>
            <tr>
                <td>{{ property.name }}</td>
                <td>{{ property.city }}</td>
                <td>
                    <p-tag [severity]="property.status === 'ACTIVE' ? 'success' : property.status === 'INACTIVE' ? 'danger' : 'warn'" 
                           [value]="property.status === 'ACTIVE' ? 'Hoạt động' : property.status === 'INACTIVE' ? 'Ngừng HĐ' : 'Chờ duyệt'"></p-tag>
                </td>
                <td>
                    <ng-container *ngIf="!isAdmin">
                        <button *ngIf="property.status === 'INACTIVE'" pButton pRipple icon="pi pi-send" class="p-button-rounded p-button-info mr-2" pTooltip="Gửi yêu cầu duyệt" (click)="submit(property)"></button>
                        <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-success mr-2" pTooltip="Sửa"></button>
                    </ng-container>

                    <ng-container *ngIf="isAdmin">
                        <button *ngIf="property.status === 'PENDING'" pButton pRipple icon="pi pi-check" class="p-button-rounded p-button-success mr-2" pTooltip="Duyệt" (click)="approve(property)"></button>
                        <button *ngIf="property.status === 'PENDING'" pButton pRipple icon="pi pi-times" class="p-button-rounded p-button-danger mr-2" pTooltip="Từ chối" (click)="reject(property)"></button>
                    </ng-container>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
