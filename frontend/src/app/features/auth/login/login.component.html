<div class="h-screen w-screen overflow-hidden bg-surface text-on-surface flex flex-col font-body-md relative">
  <!-- Background Layer with Overlay -->
  <div class="absolute inset-0 z-0 pointer-events-none">
    <img class="absolute inset-0 w-full h-full object-cover scale-105" alt="Hotel Lobby" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDVlqfrCUpDG2pLrYghend0Bvqs4hbHxZGuGU0ioLQJKOJeJ78SrR6SI5tJRUZlBGYt5TnEVTdPmJwuxHhvDbYwfC7F4LcdVeMX2DsPvPC8CZd2v0ZqwbXXTgZoSgVezKsciG_4e0QRO5f72wW7veCb-bK3nV0mC-_8LR1b2s2R3TgP28WmR9gLZ-CNdbehLstooNV4K0LgDXnjylTBVYM0hcExAS3V9M9tkhXBVQA-GuF1GBwFNB8fPLAXc7DOfVoXOV5JcRg5Ii4">
    <div class="absolute inset-0 bg-primary-container/40 backdrop-blur-[2px]"></div>
  </div>

  <!-- Content Canvas -->
  <main class="relative z-10 flex-1 flex flex-col items-center px-4 md:px-gutter py-6 overflow-y-auto custom-scrollbar">
    
    <div class="w-full max-w-[440px] my-auto shrink-0">
      <!-- Login Card -->
      <div class="glass-panel border border-outline-variant rounded-xl shadow-2xl p-6 md:p-8 relative">
        <!-- Decorative Top Border -->
        <div class="absolute top-0 left-0 w-full h-1 bg-secondary"></div>
        
        <!-- Branding -->
        <div class="flex flex-col items-center mb-6 shrink-0">
          <div class="mb-2">
            <span class="material-symbols-outlined text-primary text-[40px]" style="font-variation-settings: 'FILL' 0;">apartment</span>
          </div>
          <h1 class="font-headline-lg text-[28px] font-bold text-primary tracking-tight m-0">LuxeStay Portal</h1>
          <p class="font-body-sm text-[13px] text-on-surface-variant mt-1 text-center m-0">Đăng nhập để truy cập hệ thống</p>
        </div>

        <div *ngIf="errorMessage" class="mb-4 p-2.5 bg-red-100/80 border border-red-200 text-red-700 rounded text-center text-sm font-medium backdrop-blur-sm">
          {{ errorMessage }}
        </div>

        <form class="space-y-4 shrink-0" (ngSubmit)="onSubmit()">
          <!-- Email Field -->
          <div class="space-y-1.5">
            <label class="font-label-md text-[11px] font-bold text-on-surface-variant uppercase tracking-wider" for="username">Email đăng nhập</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/60 text-[18px]">mail</span>
              <input class="w-full pl-9 pr-4 py-2.5 bg-white border border-outline-variant rounded-lg font-body-md text-[14px] text-on-surface input-focus-ring transition-all placeholder:text-outline/50" id="username" name="username" placeholder="manager@luxuryhotel.com" type="text" [(ngModel)]="loginObj.username">
            </div>
          </div>

          <!-- Password Field -->
          <div class="space-y-1.5">
            <label class="font-label-md text-[11px] font-bold text-on-surface-variant uppercase tracking-wider" for="password">Mật khẩu</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/60 text-[18px]">lock</span>
              <input class="w-full pl-9 pr-10 py-2.5 bg-white border border-outline-variant rounded-lg font-body-md text-[14px] text-on-surface input-focus-ring transition-all placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" type="password" [(ngModel)]="loginObj.password">
              <button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors bg-transparent border-none p-0 flex items-center justify-center outline-none" type="button">
                <span class="material-symbols-outlined text-[18px]">visibility</span>
              </button>
            </div>
          </div>

          <!-- Utilities Row -->
          <div class="flex items-center justify-between py-0.5">
            <label class="flex items-center cursor-pointer group m-0">
              <div class="relative flex items-center">
                <input class="peer h-[14px] w-[14px] rounded border-outline-variant text-primary focus:ring-primary/20 transition-all cursor-pointer" name="rememberMe" [(ngModel)]="loginObj.rememberMe" type="checkbox">
              </div>
              <span class="ml-2 font-body-sm text-[12px] text-on-surface-variant group-hover:text-primary transition-colors">Ghi nhớ tôi</span>
            </label>
            <a class="font-body-sm text-[12px] text-secondary hover:text-secondary-fixed-dim font-bold transition-colors no-underline" href="#">Quên mật khẩu?</a>
          </div>

          <!-- Login Button -->
          <button [disabled]="isLoading" class="w-full bg-primary text-on-primary py-3 font-label-md text-[12px] font-bold uppercase tracking-[0.1em] rounded-lg hover:bg-primary-container transition-all duration-300 shadow-md hover:shadow-lg flex items-center justify-center gap-2 group border-0 mt-2" type="submit">
            <ng-container *ngIf="!isLoading">
              Đăng nhập
              <span class="material-symbols-outlined text-[16px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
            </ng-container>
            <ng-container *ngIf="isLoading">
              <i class="pi pi-spin pi-spinner text-xl"></i>
            </ng-container>
          </button>
        </form>

        <!-- Divider -->
        <div class="relative my-6 shrink-0">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-outline-variant"></div>
          </div>
          <div class="relative flex justify-center text-label-md">
            <span class="px-3 bg-white text-on-surface-variant/60 font-bold text-[10px]">HOẶC ĐĂNG NHẬP BẰNG</span>
          </div>
        </div>

        <!-- Social Logins -->
        <div class="mt-2 flex shrink-0 justify-center">
          <asl-google-signin-button type="standard" size="large"></asl-google-signin-button>
        </div>

        <!-- Footer within card -->
        <div class="mt-6 text-center shrink-0">
          <p class="font-body-sm text-[12px] text-on-surface-variant m-0">
            Chưa có tài khoản? 
            <a class="text-primary font-bold hover:underline decoration-secondary underline-offset-4" routerLink="/register">Tạo tài khoản mới</a>
          </p>
        </div>

      </div>
    </div>
  </main>

  <!-- Global Footer -->
  <footer class="relative z-10 w-full shrink-0 bg-surface-container-low/80 backdrop-blur-sm border-t border-outline-variant/30 h-[64px] hidden md:flex items-center">
    <div class="flex flex-col md:flex-row justify-between items-center w-full px-gutter max-w-container-max mx-auto space-y-stack-sm md:space-y-0">
      <div class="flex flex-col md:flex-row items-center md:space-x-stack-md text-center md:text-left">
        <span class="font-headline-md text-primary font-bold tracking-tight">LuxeStay</span>
        <p class="font-body-sm text-body-sm text-on-surface-variant m-0">© 2026 LuxeStay Hospitality Group. All rights reserved.</p>
      </div>
      <div class="flex space-x-stack-md">
        <a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors no-underline" href="#">Chính sách Bảo mật</a>
        <a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors no-underline" href="#">Điều khoản Dịch vụ</a>
        <a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors no-underline" href="#">Hỗ trợ</a>
      </div>
    </div>
  </footer>
</div>
