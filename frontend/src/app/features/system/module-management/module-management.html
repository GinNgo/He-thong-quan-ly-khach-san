<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="card border-0 shadow-sm">
  <div class="card-header bg-white border-0 py-3 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
    <div>
      <h5 class="mb-1 fw-bold text-primary"><i class="pi pi-sitemap me-2"></i>Khai b&aacute;o trang</h5>
      <div class="text-muted small">Qu&#7843;n l&yacute; nh&oacute;m menu v&agrave; trang hi&#7875;n th&#7883; tr&ecirc;n left menu.</div>
    </div>
    <div class="d-flex flex-wrap gap-2">
      <button pButton icon="pi pi-folder-plus" label="Th&ecirc;m nh&oacute;m" class="p-button-sm p-button-outlined" (click)="openAddModule()"></button>
      <button pButton icon="pi pi-plus" label="Th&ecirc;m trang" class="p-button-sm p-button-primary" (click)="openAddFunction()"></button>
    </div>
  </div>

  <div class="card-body p-0">
    <p-treeTable [value]="nodes" [loading]="loading" styleClass="p-treetable-sm">
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 34%">T&ecirc;n</th>
          <th style="width: 14%">M&atilde;</th>
          <th style="width: 22%">URL</th>
          <th style="width: 16%">Icon</th>
          <th style="width: 8%" class="text-center">Th&#7913; t&#7921;</th>
          <th style="width: 6%" class="text-center">S&#7917;a/X&oacute;a</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-rowNode let-rowData="rowData">
        <tr class="tree-table-row" [class.table-light]="selectedNode?.key === rowNode.node.key" (click)="selectNode(rowNode.node)">
          <td>
            <p-treeTableToggler [rowNode]="rowNode"></p-treeTableToggler>
            <i [class]="(rowData.icon || (rowData.type === 'module' ? 'pi pi-folder' : 'pi pi-file')) + ' me-2 text-muted'"></i>
            <span [class.fw-bold]="rowData.type === 'module'">{{ rowData.name }}</span>
            <span class="badge bg-light text-dark border ms-2" *ngIf="rowData.type === 'module'">Nh&oacute;m</span>
          </td>
          <td><span class="badge bg-secondary">{{ rowData.code }}</span></td>
          <td class="text-muted">{{ rowData.url || '-' }}</td>
          <td class="text-muted">{{ rowData.icon || '-' }}</td>
          <td class="text-center">{{ rowData.sortOrder || 0 }}</td>
          <td class="text-center">
            <div class="d-flex justify-content-center gap-1">
              <button pButton type="button" icon="pi pi-pencil" class="p-button-text p-button-sm" (click)="editNode(rowNode.node); $event.stopPropagation()"></button>
              <button pButton type="button" icon="pi pi-trash" class="p-button-text p-button-danger p-button-sm" (click)="deleteNode(rowNode.node); $event.stopPropagation()"></button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="text-center p-4 text-muted">Ch&#432;a c&oacute; d&#7919; li&#7879;u trang.</td>
        </tr>
      </ng-template>
    </p-treeTable>
  </div>
</div>

<p-dialog [(visible)]="displayDialog" [modal]="true" [style]="{width: '560px'}" [header]="dialogTitle" [draggable]="false" [resizable]="false">
  <div class="d-flex flex-column gap-3 p-2">
    <div class="field">
      <label class="fw-bold mb-1">M&atilde; <span class="text-danger">*</span></label>
      <input type="text" pInputText [(ngModel)]="formData.code" class="w-100 text-uppercase" placeholder="VD: REPORT_TEMPLATE" />
      <small class="text-muted" *ngIf="entityType === 'function'">M&atilde; n&agrave;y d&ugrave;ng &#273;&#7875; ph&acirc;n quy&#7873;n cho trang.</small>
    </div>

    <div class="field">
      <label class="fw-bold mb-1">T&ecirc;n hi&#7875;n th&#7883; <span class="text-danger">*</span></label>
      <input type="text" pInputText [(ngModel)]="formData.name" class="w-100" placeholder="VD: Ph&acirc;n quy&#7873;n" />
    </div>

    <ng-container *ngIf="entityType === 'function'">
      <div class="field">
        <label class="fw-bold mb-1">URL</label>
        <input type="text" pInputText [(ngModel)]="formData.url" class="w-100" placeholder="/admin/role-permissions" />
      </div>

      <div class="field">
        <label class="fw-bold mb-1">Icon PrimeNG</label>
        <input type="text" pInputText [(ngModel)]="formData.icon" class="w-100" placeholder="pi pi-shield" />
      </div>

      <div class="field">
        <label class="fw-bold mb-1">Th&#7913; t&#7921;</label>
        <input type="number" pInputText [(ngModel)]="formData.sortOrder" class="w-100" />
      </div>
    </ng-container>
  </div>

  <ng-template pTemplate="footer">
    <button pButton label="H&#7911;y" icon="pi pi-times" class="p-button-text" (click)="displayDialog = false"></button>
    <button pButton label="L&#432;u" icon="pi pi-check" class="p-button-primary" (click)="save()"></button>
  </ng-template>
</p-dialog>
