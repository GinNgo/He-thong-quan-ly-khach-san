<div class="bg-gray-50 min-h-screen pb-20">

  <!-- Sticky Search Bar -->
  <app-sticky-search-bar [isVisible]="showStickySearch"></app-sticky-search-bar>

  <!-- Hero Section -->
  <section id="home" class="relative h-[600px] flex items-center justify-center">
    <!-- Background Image -->
    <div class="absolute inset-0 z-0">
      <img src="https://images.unsplash.com/photo-1540541338287-41700207dee6?auto=format&fit=crop&w=1920&q=80" alt="Resort" class="w-full h-full object-cover">
      <!-- Dark overlay -->
      <div class="absolute inset-0 bg-black/40"></div>
    </div>
    
    <div class="relative z-10 text-center px-4 w-full max-w-7xl flex flex-col items-center">
      <h1 class="text-4xl md:text-5xl lg:text-[64px] font-bold text-white mb-6 font-serif drop-shadow-lg leading-tight animate-fade-in-up">
        Trải nghiệm <span class="text-blue-400">Đẳng cấp</span>
      </h1>
      <p class="text-lg md:text-xl text-gray-100 max-w-2xl mx-auto font-medium drop-shadow-md animate-fade-in-up animation-delay-100 mb-0">
        Khám phá hàng ngàn khách sạn, khu nghỉ dưỡng cao cấp tại Việt Nam với giá tốt nhất.
      </p>
    </div>
  </section>

  <!-- Hero Search Component (Positioned to overlap Hero bottom) -->
  <div #heroSearchRef class="relative z-20 max-w-7xl mx-auto px-4 mt-[-80px]">
    <app-hero-search></app-hero-search>
  </div>

  <!-- Main Content Area -->
  <div class="max-w-7xl mx-auto px-4 mt-16">
    
    <!-- Promotions Component -->
    <app-promotions [promotions]="promotions"></app-promotions>

    <!-- Popular Destinations Component -->
    <app-popular-destinations 
      [destinations]="destinations" 
      [loading]="isLoadingDestinations">
    </app-popular-destinations>

  </div>
</div>
