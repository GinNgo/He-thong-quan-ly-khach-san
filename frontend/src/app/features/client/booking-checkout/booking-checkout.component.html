<div class="min-h-screen bg-gray-50 pb-12 font-sans pt-8">
  <div class="max-w-3xl mx-auto px-4 md:px-0">
    
    <!-- Success State -->
    <div *ngIf="bookingSuccess" class="bg-white p-8 rounded-lg shadow-md text-center">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="pi pi-check text-green-600 text-3xl"></i>
      </div>
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Đặt phòng thành công!</h2>
      <p class="text-gray-600 mb-6">Mã đặt phòng của bạn là: <span class="font-bold text-gray-900">#{{ reservationDetails?.id }}</span></p>
      <p class="text-gray-600 mb-8">Vui lòng thanh toán tại quầy lễ tân khi nhận phòng.</p>
      <div class="flex flex-col sm:flex-row justify-center gap-3">
        <button class="bg-[#0071c2] hover:bg-[#005999] text-white font-bold py-3 px-8 rounded transition-colors" (click)="goToProfileBookings()">
          Xem chuyến đi
        </button>
        <button class="bg-white hover:bg-gray-50 text-[#0071c2] border border-[#0071c2] font-bold py-3 px-8 rounded transition-colors" (click)="goHome()">
          Trở về Trang chủ
        </button>
      </div>
    </div>

    <!-- Booking Form -->
    <div *ngIf="!bookingSuccess" class="bg-white p-6 md:p-8 rounded-lg shadow-md">
      <h2 class="text-2xl font-bold text-gray-900 mb-6 border-b pb-4">Thông tin Đặt phòng</h2>

      <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-700 rounded p-3 mb-6 text-sm font-medium">
        {{ errorMessage }}
      </div>
      
      <form (ngSubmit)="submitBooking()" #bookingForm="ngForm">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Họ</label>
            <input type="text" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-[#0071c2]" 
                   [(ngModel)]="bookingData.lastName" name="lastName" required>
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Tên</label>
            <input type="text" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-[#0071c2]" 
                   [(ngModel)]="bookingData.firstName" name="firstName" required>
          </div>
        </div>

        <div class="mb-6">
          <label class="block text-sm font-bold text-gray-700 mb-2">Số điện thoại</label>
          <input type="tel" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-[#0071c2]" 
                 [(ngModel)]="bookingData.phone" name="phone" required>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Ngày nhận phòng</label>
            <input type="date" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-[#0071c2]" 
                   [(ngModel)]="bookingData.checkInDate" name="checkInDate" required>
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Ngày trả phòng</label>
            <input type="date" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-[#0071c2]" 
                   [(ngModel)]="bookingData.checkOutDate" name="checkOutDate" [min]="bookingData.checkInDate" required>
          </div>
        </div>

        <div class="mb-8">
          <label class="block text-sm font-bold text-gray-700 mb-2">Số khách</label>
          <input type="number" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-primary" 
                 [(ngModel)]="bookingData.guests" name="guests" min="1" required>
        </div>
        
        <div class="mb-8">
          <label class="block text-sm font-bold text-gray-700 mb-3">Phương thức thanh toán</label>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            
            <label class="border rounded-lg p-4 cursor-pointer flex items-center gap-3 transition-colors"
                   [class.border-primary]="bookingData.paymentMethod === 'PAY_AT_HOTEL'"
                   [class.bg-blue-50]="bookingData.paymentMethod === 'PAY_AT_HOTEL'">
              <input type="radio" name="paymentMethod" value="PAY_AT_HOTEL" [(ngModel)]="bookingData.paymentMethod" class="w-4 h-4 text-primary">
              <div class="flex-1">
                <div class="font-bold text-gray-900">Thanh toán tại quầy</div>
                <div class="text-xs text-gray-500">Thanh toán khi nhận phòng</div>
              </div>
              <i class="pi pi-building text-gray-400 text-xl"></i>
            </label>

            <label class="border rounded-lg p-4 cursor-pointer flex items-center gap-3 transition-colors"
                   [class.border-[#A50064]]="bookingData.paymentMethod === 'MOMO'"
                   [class.bg-pink-50]="bookingData.paymentMethod === 'MOMO'">
              <input type="radio" name="paymentMethod" value="MOMO" [(ngModel)]="bookingData.paymentMethod" class="w-4 h-4 text-[#A50064]">
              <div class="flex-1">
                <div class="font-bold text-gray-900">Ví MoMo</div>
                <div class="text-xs text-gray-500">Quét mã QR qua ứng dụng</div>
              </div>
              <div class="w-8 h-8 rounded bg-[#A50064] text-white flex items-center justify-center font-bold text-xs">MoMo</div>
            </label>

            <label class="border rounded-lg p-4 cursor-pointer flex items-center gap-3 transition-colors"
                   [class.border-[#005BAA]]="bookingData.paymentMethod === 'VNPAY'"
                   [class.bg-blue-50]="bookingData.paymentMethod === 'VNPAY'">
              <input type="radio" name="paymentMethod" value="VNPAY" [(ngModel)]="bookingData.paymentMethod" class="w-4 h-4 text-[#005BAA]">
              <div class="flex-1">
                <div class="font-bold text-gray-900">VNPAY</div>
                <div class="text-xs text-gray-500">Thanh toán qua thẻ ATM/Bank</div>
              </div>
              <div class="w-8 h-8 rounded bg-[#005BAA] text-white flex items-center justify-center font-bold text-xs">VN</div>
            </label>

            <label class="border rounded-lg p-4 cursor-pointer flex items-center gap-3 transition-colors"
                   [class.border-[#635BFF]]="bookingData.paymentMethod === 'STRIPE'"
                   [class.bg-indigo-50]="bookingData.paymentMethod === 'STRIPE'">
              <input type="radio" name="paymentMethod" value="STRIPE" [(ngModel)]="bookingData.paymentMethod" class="w-4 h-4 text-[#635BFF]">
              <div class="flex-1">
                <div class="font-bold text-gray-900">Thẻ Tín Dụng</div>
                <div class="text-xs text-gray-500">Thanh toán quốc tế an toàn</div>
              </div>
              <i class="pi pi-credit-card text-[#635BFF] text-xl"></i>
            </label>

          </div>
        </div>

        <button type="submit" 
                class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded transition-colors disabled:opacity-50 flex justify-center items-center gap-2"
                [disabled]="!bookingForm.valid || isSubmitting">
          <i class="pi pi-spin pi-spinner" *ngIf="isSubmitting"></i>
          <span>Hoàn tất Đặt phòng</span>
        </button>

      </form>
    </div>
  </div>
</div>
