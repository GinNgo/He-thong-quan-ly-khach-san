<div class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
  <!-- Chat Popup -->
  <div *ngIf="isOpen" class="bg-white rounded-2xl shadow-2xl w-80 sm:w-96 mb-4 overflow-hidden border border-gray-100 flex flex-col h-[500px] transition-all duration-300 origin-bottom-right">
    
    <!-- Header -->
    <div class="bg-primary text-white p-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
          <i class="pi pi-headphones text-xl"></i>
        </div>
        <div>
          <h3 class="font-bold">Hỗ trợ trực tuyến</h3>
          <p class="text-xs text-white/80">Chúng tôi luôn sẵn sàng hỗ trợ bạn</p>
        </div>
      </div>
      <button (click)="toggleChat()" class="text-white/80 hover:text-white transition-colors">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="flex-1 p-4 overflow-y-auto bg-gray-50 flex flex-col gap-3" #scrollMe>
      
      <!-- Not logged in state -->
      <div *ngIf="!isLoggedIn" class="h-full flex flex-col items-center justify-center text-center p-4">
        <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-4">
          <i class="pi pi-lock text-2xl"></i>
        </div>
        <h4 class="font-bold text-gray-800 mb-2">Đăng nhập để Chat</h4>
        <p class="text-sm text-gray-500 mb-4">Bạn cần đăng nhập để gửi tin nhắn cho bộ phận CSKH của chúng tôi.</p>
        <a routerLink="/login" class="bg-primary text-white px-6 py-2 rounded-full text-sm font-medium hover:bg-primary/90 transition-colors">
          Đăng nhập ngay
        </a>
      </div>

      <!-- Logged in state -->
      <ng-container *ngIf="isLoggedIn">
        <div *ngIf="messages.length === 0" class="text-center text-gray-400 text-sm mt-8">
          Chưa có tin nhắn nào. Hãy gửi lời chào!
        </div>

        <!-- Chat messages -->
        <div *ngFor="let msg of messages" class="flex w-full" [ngClass]="{'justify-end': msg.senderId === currentUserId, 'justify-start': msg.senderId !== currentUserId}">
          <div [ngClass]="msg.senderId === currentUserId ? 'bg-primary text-white rounded-l-2xl rounded-tr-2xl' : 'bg-white text-gray-800 rounded-r-2xl rounded-tl-2xl border border-gray-100 shadow-sm'" 
               class="max-w-[80%] px-4 py-2 text-sm">
            <p>{{ msg.content }}</p>
            <span class="text-[10px] block mt-1" [ngClass]="msg.senderId === currentUserId ? 'text-white/70 text-right' : 'text-gray-400'">
              {{ msg.timestamp | date:'HH:mm' }}
            </span>
          </div>
        </div>
      </ng-container>

    </div>

    <!-- Footer Input -->
    <div *ngIf="isLoggedIn" class="p-3 bg-white border-t border-gray-100 flex items-center gap-2">
      <input type="text" [(ngModel)]="newMessage" (keyup.enter)="sendMessage()" placeholder="Nhập tin nhắn..." 
             class="flex-1 bg-gray-100 border-transparent focus:bg-white focus:border-primary focus:ring-1 focus:ring-primary rounded-full px-4 py-2 text-sm outline-none transition-all">
      <button (click)="sendMessage()" [disabled]="!newMessage.trim()" 
              class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed hover:bg-primary/90 transition-colors">
        <i class="pi pi-send"></i>
      </button>
    </div>

  </div>

  <!-- Toggle Button -->
  <button *ngIf="!isOpen" (click)="toggleChat()" 
          class="w-14 h-14 bg-primary text-white rounded-full shadow-lg hover:shadow-xl hover:scale-105 transition-all flex items-center justify-center relative">
    <i class="pi pi-comments text-2xl"></i>
    <!-- Optional: Unread badge -->
    <!-- <span class="absolute top-0 right-0 w-3 h-3 bg-red-500 border-2 border-white rounded-full"></span> -->
  </button>
</div>
