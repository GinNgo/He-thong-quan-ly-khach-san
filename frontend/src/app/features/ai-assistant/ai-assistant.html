<div class="ai-widget-container">
  <!-- Chat Window -->
  <div class="ai-chat-window shadow-lg" *ngIf="isOpen">
    <div class="ai-header d-flex justify-content-between align-items-center p-3">
      <div class="d-flex align-items-center">
        <i class="pi pi-sparkles fs-4 me-2" style="color: var(--hotel-gold);"></i>
        <div>
          <h6 class="mb-0 fw-bold text-white">AI Concierge</h6>
          <small class="text-white-50">Sẵn sàng hỗ trợ 24/7</small>
        </div>
      </div>
      <button class="btn btn-link text-white p-0" (click)="toggleChat()">
        <i class="pi pi-times fs-5"></i>
      </button>
    </div>

    <div class="ai-body p-3" #scrollMe>
      <div *ngFor="let msg of messages" class="mb-3 d-flex" [ngClass]="msg.sender === 'user' ? 'justify-content-end' : 'justify-content-start'">
        <!-- AI Avatar -->
        <div class="ai-avatar me-2" *ngIf="msg.sender === 'ai'">
          <i class="pi pi-sparkles"></i>
        </div>
        
        <!-- Message Bubble -->
        <div class="msg-bubble p-3 shadow-sm" [ngClass]="msg.sender === 'user' ? 'msg-user' : 'msg-ai'">
          <!-- Pre-formatted text for AI reply to handle Markdown-like bullet points -->
          <span style="white-space: pre-wrap; font-size: 0.9rem;">{{ msg.text }}</span>
          <div class="msg-time mt-1 text-end" style="font-size: 0.7rem; opacity: 0.7;">
            {{ msg.time | date:'HH:mm' }}
          </div>
        </div>
      </div>
      
      <!-- Typing indicator -->
      <div class="mb-3 d-flex justify-content-start" *ngIf="isTyping">
        <div class="ai-avatar me-2">
          <i class="pi pi-sparkles"></i>
        </div>
        <div class="msg-bubble msg-ai p-3 shadow-sm d-flex align-items-center">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>

    <div class="ai-footer p-3 border-top bg-white">
      <div class="input-group">
        <input type="text" class="form-control" placeholder="Hỏi tôi bất cứ điều gì..." [(ngModel)]="newMessage" (keyup.enter)="sendMessage()">
        <button class="btn" style="background-color: var(--hotel-primary); color: white;" (click)="sendMessage()" [disabled]="!newMessage.trim() || isTyping">
          <i class="pi pi-send"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Floating Button -->
  <button class="ai-fab shadow-lg" (click)="toggleChat()" [ngClass]="{'open': isOpen}">
    <i class="pi" [ngClass]="isOpen ? 'pi-times' : 'pi-sparkles'"></i>
  </button>
</div>
