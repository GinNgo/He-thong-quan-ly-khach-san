<div class="d-flex" style="height: 100vh; background-color: var(--hotel-bg); overflow: hidden;">
  <!-- Sidebar -->
  <app-sidebar class="flex-shrink-0" [isCollapsed]="isSidebarCollapsed"></app-sidebar>
  
  <!-- Main Content Area -->
  <div class="flex-grow-1 d-flex flex-column" style="height: 100vh; overflow: hidden;">
    <!-- Top Header -->
    <header class="d-flex align-items-center justify-content-between px-4 py-3 border-bottom bg-white sticky-top shadow-sm flex-shrink-0" style="height: 70px;">
      <div class="d-flex align-items-center gap-3">
        <!-- Hamburger Button -->
        <button class="btn btn-light border-0 d-flex align-items-center justify-content-center p-2 rounded-circle" (click)="toggleSidebar()" style="width: 40px; height: 40px; background-color: #f1f5f9;">
          <i class="pi pi-bars fs-5 text-dark"></i>
        </button>
        <h1 class="h4 mb-0 fw-bold text-dark d-none d-sm-block">{{ pageTitle }}</h1>
      </div>
      
      <div class="d-flex align-items-center gap-4">
        <!-- Search bar -->
        <div class="position-relative d-none d-md-block">
          <i class="pi pi-search position-absolute text-muted" style="left: 1rem; top: 50%; transform: translateY(-50%);"></i>
          <input
            type="text"
            class="form-control bg-light border-0 rounded-pill ps-5 pe-4 py-2"
            placeholder="Tìm nhanh màn hình..."
            style="width: 250px;"
            [(ngModel)]="globalSearchTerm"
            (keyup.enter)="executeGlobalSearch()">
        </div>
        
        <!-- Notifications -->
        <div class="position-relative">
          <button class="btn btn-link text-muted p-0 position-relative border-0 text-decoration-none" (click)="toggleNotifications()">
            <i class="pi pi-bell fs-5"></i>
            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
          </button>
          <div *ngIf="isNotificationOpen" class="position-absolute end-0 mt-3 bg-white shadow border rounded-3 overflow-hidden" style="width: 320px; z-index: 30;">
            <div class="px-3 py-2 border-bottom fw-bold text-dark">Thông báo vận hành</div>
            <div class="p-3 border-bottom">
              <div class="fw-semibold text-dark small">Có đặt phòng đang chờ xác nhận</div>
              <div class="text-muted small">Kiểm tra mục Quản lý Đặt phòng để xử lý.</div>
            </div>
            <div class="p-3">
              <div class="fw-semibold text-dark small">Nhắc kiểm tra hóa đơn</div>
              <div class="text-muted small">Các booking đã check-out cần xuất hóa đơn.</div>
            </div>
          </div>
        </div>
        
        <!-- User Profile -->
        <div class="d-flex align-items-center gap-3 border-start ps-4">
          <div class="position-relative">
            <button type="button" class="btn p-0 d-flex align-items-center text-decoration-none text-dark border-0 bg-transparent" (click)="toggleUserMenu()">
              <div class="rounded-circle bg-light d-flex align-items-center justify-content-center me-2 overflow-hidden" style="width: 40px; height: 40px;">
                <img [src]="'https://ui-avatars.com/api/?name=' + currentUserName + '&background=1a56db&color=fff'" alt="Avatar" class="w-100 h-100 object-fit-cover">
              </div>
              <div class="d-none d-lg-block text-start">
                <p class="mb-0 fw-semibold text-dark" style="font-size: 0.875rem;">{{ currentUserName }}</p>
                <p class="mb-0 text-muted" style="font-size: 0.75rem;">{{ currentRoleLabel }}</p>
              </div>
              <i class="pi pi-chevron-down ms-2 text-muted small"></i>
            </button>
            <ul *ngIf="isUserMenuOpen" class="position-absolute end-0 mt-3 dropdown-menu show shadow border-0" style="min-width: 220px; z-index: 30;">
              <li><button class="dropdown-item py-2" type="button" (click)="viewProfile()"><i class="pi pi-user me-2 text-muted"></i> Hồ sơ</button></li>
              <li><button class="dropdown-item py-2" type="button" (click)="executeGlobalSearch()"><i class="pi pi-search me-2 text-muted"></i> Tìm nhanh</button></li>
              <li><hr class="dropdown-divider"></li>
              <li><button class="dropdown-item text-danger py-2" type="button" (click)="logout()"><i class="pi pi-sign-out me-2"></i> Đăng xuất</button></li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Router Outlet & Footer -->
    <main class="flex-grow-1 overflow-auto d-flex flex-column" style="background-color: #f8fafc;">
      <div class="flex-grow-1 p-4">
        <router-outlet></router-outlet>
      </div>
      
      <!-- Footer -->
      <footer class="py-3 text-center text-muted border-top bg-white flex-shrink-0" style="font-size: 0.875rem;">
        &copy; 2026 Aurora Hotel Management. All rights reserved.
      </footer>
    </main>
  </div>
</div>

<app-ai-assistant></app-ai-assistant>
