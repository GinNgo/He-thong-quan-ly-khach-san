<div class="d-flex flex-column flex-shrink-0 p-3 sidebar-container" [class.collapsed]="isCollapsed" style="background-color: #1e293b; color: #fff; height: 100vh; overflow-y: auto;">
  <div class="d-flex align-items-center mb-4 mt-2 px-2 brand-container">
    <div class="d-flex align-items-center justify-content-center fw-bold text-white rounded-1 me-3 shadow-sm brand-logo" style="width: 32px; height: 32px; background-color: #f59e0b; flex-shrink: 0;">A</div>
    <div class="text-uppercase fw-bold sidebar-text" style="letter-spacing: 0.1em; font-size: 0.875rem; line-height: 1.2; white-space: nowrap;">
      AURORA <br> 
      <span class="text-white-50" style="font-size: 0.65rem;">HOTEL MANAGEMENT</span>
    </div>
  </div>
  
  <ul class="nav nav-pills flex-column mb-auto gap-1 px-1">
    @for (module of menuItems; track module.id) {
      <li class="nav-item mt-3 px-3">
        <span class="text-uppercase fw-bold text-white-50" style="font-size: 0.7rem; letter-spacing: 0.1em;">{{module.name}}</span>
      </li>
      @for (func of module.functions; track func.id) {
        <li class="nav-item" [title]="func.name">
          <a [routerLink]="func.url" routerLinkActive="sidebar-active text-white" [routerLinkActiveOptions]="{exact: func.url === '/admin/dashboard'}" class="nav-link text-white-50 d-flex align-items-center rounded-2 sidebar-link py-3 px-3 fw-medium">
            <i [class]="func.icon" class="me-3 fs-5 sidebar-icon"></i>
            <span class="sidebar-text text-truncate d-block">{{func.name}}</span>
          </a>
        </li>
      }
    }
  </ul>
</div>
